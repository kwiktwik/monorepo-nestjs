<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KwikTwik Admin Control</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              primary: '#6366f1',
              surface: '#1e293b',
              surfaceHover: '#334155',
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #0f172a;
        color: #e2e8f0;
        background-image:
          radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(
            at 50% 0%,
            hsla(225, 39%, 30%, 0.2) 0,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            hsla(339, 49%, 30%, 0.2) 0,
            transparent 50%
          );
        background-attachment: fixed;
      }

      /* Glassmorphism panel */
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* Terminal Line Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .term-line {
        animation: fadeIn 0.15s ease-out forwards;
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased overflow-hidden flex flex-col"
  >
    <!-- Header -->
    <header
      class="glass-panel border-b border-white/10 px-6 py-4 flex justify-between items-center z-10 shrink-0"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-lg bg-gradient-to-tr from-primary to-purple-500 flex items-center justify-center shadow-lg shadow-primary/20"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-white"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m18 16 4-4-4-4" />
            <path d="m6 8-4 4 4 4" />
            <path d="m14.5 4-5 16" />
          </svg>
        </div>
        <div>
          <h1 class="font-bold text-lg tracking-tight text-white/90">
            KwikTwik Commander
          </h1>
          <p class="text-xs text-white/50 leading-none">
            Global Admin Dashboard
          </p>
        </div>
      </div>
      <div
        class="text-xs font-mono px-3 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 flex items-center gap-2"
      >
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        System Online
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
      <!-- Sidebar: Scripts list -->
      <aside
        class="w-72 glass-panel border-r border-white/10 flex flex-col shrink-0 z-0 relative shadow-2xl z-10"
      >
        <div class="p-4 border-b border-white/5">
          <h2
            class="text-xs font-semibold uppercase tracking-wider text-white/40 mb-3"
          >
            Available Scripts
          </h2>
          <div class="relative">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="absolute left-3 top-2.5 w-4 h-4 text-white/30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search scripts..."
              class="w-full bg-black/20 border border-white/10 rounded-lg py-2 pl-9 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 text-white placeholder:text-white/30 transition-all"
            />
          </div>
        </div>
        <div class="p-2 border-b border-white/5">
          <a
            href="/admin/phonepe.html"
            class="flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all border hover:bg-purple-500/10 border-purple-500/20 text-white/80 group"
          >
            <div
              class="w-8 h-8 rounded-lg bg-gradient-to-tr from-purple-600 to-violet-500 flex items-center justify-center shadow-lg shadow-purple-500/20 group-hover:shadow-purple-500/40 transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 text-white"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect width="20" height="14" x="2" y="5" rx="2" />
                <line x1="2" x2="22" y1="10" y2="10" />
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <span class="font-medium text-sm block">PhonePe Utilities</span>
              <span class="text-xs text-white/40 truncate block"
                >Check payments & subscriptions</span
              >
            </div>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-white/30 group-hover:text-purple-400 transition-colors"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="m9 18 6-6-6-6" />
            </svg>
          </a>
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="scriptsList">
          <!-- Script items will be injected here -->
          <div class="animate-pulse flex items-center p-3">
            <div class="h-4 bg-white/10 rounded w-3/4"></div>
          </div>
        </div>
      </aside>

      <!-- Right Pane: Terminal & Controls -->
      <section class="flex-1 flex flex-col min-w-0 bg-transparent relative">
        <!-- Context Header -->
        <div
          class="px-8 py-5 border-b border-white/5 bg-black/10 backdrop-blur-sm shadow-sm flex items-end justify-between shrink-0 h-[88px]"
        >
          <div>
            <h2
              id="selectedScriptName"
              class="text-2xl font-bold text-white/90 tracking-tight flex items-center gap-3"
            >
              <span class="text-white/30">/</span> Select a script
            </h2>
            <p class="text-sm text-white/40 mt-1" id="scriptDesc">
              Waiting for selection...
            </p>
          </div>

          <div
            class="flex gap-3 items-center opacity-0 transition-opacity duration-300 pointer-events-none"
            id="actionPanel"
          >
            <input
              type="text"
              id="argsInput"
              placeholder="Arguments (comma separated)..."
              class="w-64 bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 text-white placeholder:text-white/30 font-mono transition-all"
            />
            <button
              id="runBtn"
              class="bg-primary hover:bg-indigo-500 text-white font-semibold py-2 px-6 rounded-lg shadow-lg shadow-primary/30 transition-all active:scale-95 flex items-center gap-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
              Execute
            </button>
            <button
              id="stopBtn"
              class="hidden bg-red-500/20 hover:bg-red-500/30 text-red-500 border border-red-500/50 font-semibold py-2 px-4 rounded-lg transition-all active:scale-95 flex items-center gap-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="6" height="6" x="9" y="9" rx="1" />
              </svg>
              Stop
            </button>
          </div>
        </div>

        <!-- Terminal output area -->
        <div class="flex-1 p-6 relative overflow-hidden flex flex-col">
          <!-- Terminal decorative window controls -->
          <div
            class="absolute top-6 left-6 right-6 h-8 bg-black/40 rounded-t-xl border border-white/10 border-b-0 flex items-center px-4 gap-2 z-10 backdrop-blur-md"
          >
            <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
            <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
            <div
              class="flex-1 text-center text-xs font-mono text-white/30 truncate px-4"
              id="termTitle"
            >
              terminal - ksh
            </div>
          </div>

          <div
            id="terminalBody"
            class="flex-1 bg-black/60 rounded-b-xl border border-white/10 border-t-0 p-4 pt-10 font-mono text-sm overflow-y-auto shadow-2xl relative"
          >
            <div id="terminalContent" class="space-y-1 pb-4">
              <span class="text-white/30 term-line block"
                >Welcome to KwikTwik Commander.</span
              >
              <span class="text-white/30 term-line block"
                >Select a script from the sidebar and execute.</span
              >
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // State
      let scripts = [];
      let selectedScript = null;
      let eventSource = null;

      // Elements
      const scriptsListEl = document.getElementById('scriptsList');
      const searchInput = document.getElementById('searchInput');
      const selectedScriptNameEl =
        document.getElementById('selectedScriptName');
      const scriptDescEl = document.getElementById('scriptDesc');
      const actionPanel = document.getElementById('actionPanel');
      const argsInput = document.getElementById('argsInput');
      const runBtn = document.getElementById('runBtn');
      const stopBtn = document.getElementById('stopBtn');
      const terminalContent = document.getElementById('terminalContent');
      const terminalBody = document.getElementById('terminalBody');
      const termTitle = document.getElementById('termTitle');

      // Fetch scripts on load
      async function fetchScripts() {
        try {
          // Notice the relative URL path since we are served from /admin
          const res = await fetch('/api/admin/scripts');
          if (!res.ok) {
            if (res.status === 401) window.location.reload(); // Prompt basic auth natively
            throw new Error('Failed to fetch scripts');
          }
          const data = await res.json();
          scripts = data.scripts || [];
          renderScripts(scripts);
        } catch (e) {
          termLog(`Error fetching scripts: ${e.message}`, 'error');
          scriptsListEl.innerHTML = `<div class="p-4 text-xs text-red-400">Error loading scripts. Refresh to try again.</div>`;
        }
      }

      // Render Sidebar
      function renderScripts(list) {
        scriptsListEl.innerHTML = '';
        if (list.length === 0) {
          scriptsListEl.innerHTML = `<div class="p-4 text-sm text-white/40 text-center">No scripts found.</div>`;
          return;
        }

        list.forEach((script) => {
          const isSelected = selectedScript === script;
          const div = document.createElement('div');
          div.className = `flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all border ${isSelected ? 'bg-primary/20 border-primary/30 text-white' : 'hover:bg-white/5 border-transparent text-white/70'}`;

          div.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" ${isSelected ? 'text-primary' : 'text-white/30'} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
                    <span class="font-mono text-sm truncate select-none">${script}</span>
                `;

          div.onclick = () => selectScript(script);
          scriptsListEl.appendChild(div);
        });
      }

      // Search Filter
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = scripts.filter((s) => s.toLowerCase().includes(query));
        renderScripts(filtered);
      });

      // Select Script
      function selectScript(name) {
        selectedScript = name;
        renderScripts(scripts);

        selectedScriptNameEl.innerHTML = `<span class="text-white/30">/scripts/</span>${name}`;
        scriptDescEl.textContent = 'Ready to execute.';
        termTitle.textContent = `node scripts/${name}`;

        actionPanel.classList.remove('opacity-0', 'pointer-events-none');
        argsInput.value = ''; // clear previous args
      }

      // Terminal Log Function
      function termLog(text, type = 'info') {
        // Because output can be large and contain multiple lines, we split by newline
        const lines = text.toString().split('\\n');

        lines.forEach((line) => {
          if (!line) return;
          const span = document.createElement('span');
          span.className =
            'term-line block break-all mb-0.5 ' +
            (type === 'error' || type === 'stderr'
              ? 'text-red-400'
              : type === 'success'
                ? 'text-green-400'
                : type === 'info'
                  ? 'text-blue-300'
                  : 'text-gray-300');

          // Extremely simple linkification or formatting could go here
          span.textContent = line;
          terminalContent.appendChild(span);
        });

        // Auto-scroll
        terminalBody.scrollTop = terminalBody.scrollHeight;
      }

      function clearTerm() {
        terminalContent.innerHTML = '';
      }

      function setRunningState(isRunning) {
        if (isRunning) {
          runBtn.classList.add('hidden');
          stopBtn.classList.remove('hidden');
          argsInput.disabled = true;
          argsInput.classList.add('opacity-50');
        } else {
          runBtn.classList.remove('hidden');
          stopBtn.classList.add('hidden');
          argsInput.disabled = false;
          argsInput.classList.remove('opacity-50');
        }
      }

      // Run Logic
      runBtn.addEventListener('click', () => {
        if (!selectedScript) return;

        clearTerm();

        // Parse args
        const rawArgs = argsInput.value
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        const argStr = JSON.stringify(rawArgs);

        termLog(
          `$ node scripts/${selectedScript} ${rawArgs.join(' ')}\n`,
          'info',
        );
        setRunningState(true);

        // Connect to SSE stream
        const url = new URL(
          `/api/admin/scripts/${selectedScript}/stream`,
          window.location.origin,
        );
        url.searchParams.set('args', argStr);

        eventSource = new EventSource(url.href);

        eventSource.onmessage = (e) => {
          try {
            const payload = JSON.parse(e.data);
            switch (payload.type) {
              case 'stdout':
                termLog(payload.data, 'stdout');
                break;
              case 'stderr':
                termLog(payload.data, 'stderr');
                break;
              case 'error':
                termLog(`[ERROR] ${payload.data}`, 'error');
                break;
              case 'done':
                termLog(
                  `\n[Process exited with code ${payload.code}]`,
                  payload.code === 0 ? 'success' : 'error',
                );
                eventSource.close();
                setRunningState(false);
                break;
            }
          } catch (err) {
            termLog(e.data, 'stdout');
          }
        };

        eventSource.onerror = (e) => {
          // If it's closed normally we don't necessarily log an error
          if (eventSource.readyState === EventSource.CLOSED) return;
          termLog(
            `[Stream Error] Connection lost or failed to connect. (Status: ${e.type})`,
            'error',
          );
          eventSource.close();
          setRunningState(false);
        };
      });

      stopBtn.addEventListener('click', () => {
        if (eventSource) {
          eventSource.close();
          termLog(`\n[Process terminated by user]`, 'error');
          setRunningState(false);
        }
      });

      // Init
      fetchScripts();
    </script>
  </body>
</html>
